[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "acemusic"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-bdd",
    "pytest-cov",
    "ruff",
    "black",
]

[tool.hatch.build.targets.wheel]
packages = ["src/acemusic"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
