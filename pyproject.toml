[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "acemusic"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-bdd",
    "pytest-cov",
    "ruff",
    "black",
]

[tool.hatch.build.targets.wheel]
packages = ["src/acemusic"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
known-first-party = ["acemusic"]

[tool.black]
line-length = 120
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=src/acemusic --cov-report=term-missing"
bdd_features_base_dir = "tests/features"
