repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  # black runs first — it owns all formatting decisions
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  # ruff runs after black, check-only (no --fix) to avoid circular reformatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff
        args: [--no-fix]
